about:
  eyebrow: About
  title: A compact academic profile
  last_update: June 2026
  stats:
    - label: Publications
      value: "37"
    - label: Citations
      value: "2,247"
  paragraphs:
    - >
      My research develops computational infrastructure for analyzing biological variation 
      at population scale, with a focus on long-read sequencing.
    - >
      Conventional per-sample frameworks become fundamentally inefficient as collections grow 
      to thousands of samples—a bottleneck especially acute for long-read data, where rich isoform 
      and structural-variant information remains largely inaccessible without purpose-built 
      tools. My approach reorganizes biological data around specific variation types rather 
      than monolithic per-sample files, enabling efficient, targeted queries across populations.
    - >
      I further extend this paradigm from the variation level to the knowledge level, drawing 
      on ontologies and specialized database and indexing techniques to aggregate variant callsets, 
      raw sequence, and curated annotations into unified, structured online resources for global sharing.

research:
  - title: Long-read genomics
    description: >
      Indexing, querying, and interpreting long-read variation data, with
      attention to scalable search and practical cohort analysis.
  - title: Cancer genomics and multi-omics
    description: >
      Building resources that connect cancer genomes, annotations, metabolic
      knowledge, and cell-line identity across data layers.
  - title: Transcriptomics and isoforms
    description: >
      Curating and visualizing alternative splicing, isoform structure, and
      expression evidence for easier biological interpretation.
  - title: Scientific web software
    description: >
      Designing web tools, databases, and visualization libraries that make
      complex genomics outputs inspectable and reusable.

