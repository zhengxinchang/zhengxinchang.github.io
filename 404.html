<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found</title>
    <script>
      (function () {
        var appBase = "/isoatlas";
        var path = window.location.pathname;
        if (path === appBase || path.indexOf(appBase + "/") === 0) {
          var route = path.slice(appBase.length) || "/";
          window.location.replace(appBase + "/#" + route + window.location.search + window.location.hash);
        }
      })();
    </script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2937;
        background: #f8fafc;
      }
      main {
        max-width: 34rem;
        padding: 2rem;
        line-height: 1.5;
      }
      a {
        color: #0f766e;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Page not found</h1>
      <p>The requested page does not exist. IsoAtlas links are redirected automatically when possible.</p>
      <p><a href="/main/index.html">Return to the homepage</a></p>
    </main>
  </body>
</html>
